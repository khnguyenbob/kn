<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🌸 K-Strawberry Korean – Học tiếng Hàn pastel cùng GenZ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff0f5;
      --surface: #ffffff;
      --surface2: #ffe4ec;
      --text: #4a2040;
      --text2: #8b5e7c;
      --border: #fccdd3;
      --primary: #e84393;
      --primary-glow: #fd79a8;
      --accent: #f06292;
      --teal: #0d9488;
      --subject: #00cec9;
      --verb: #f78fb3;
      --object: #fdcb6e;
      --adjective: #ffdd59;
      --adverb: #55efc4;
      --noun: #dda0dd;
      --particle: #b2bec3;
      --card-shadow: 0 8px 28px rgba(232, 67, 147, 0.12);
      --glass-bg: rgba(255, 255, 255, 0.6);
      --glass-border: rgba(255, 192, 203, 0.6);
      --streak-glow: #fbc531;
    }
    .dark-mode {
      --bg: #2d1b2e;
      --surface: #402b3c;
      --surface2: #53334a;
      --text: #f5e3f0;
      --text2: #d3a5c1;
      --border: #6b4a62;
      --primary: #f78fb3;
      --primary-glow: #f5a9cb;
      --card-shadow: 0 8px 32px rgba(0,0,0,0.4);
      --glass-bg: rgba(64, 43, 60, 0.7);
      --glass-border: rgba(247, 143, 179, 0.35);
      --streak-glow: #f6e58d;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Plus Jakarta Sans', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: all 0.4s ease;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; top:-20%; left:-15%;
      width:65vw; height:65vw;
      background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
      opacity:0.15; animation: blobFloat 20s infinite alternate;
      border-radius:50%; pointer-events:none; z-index:0;
    }
    body::after {
      content: '';
      position: fixed; bottom:-25%; right:-12%;
      width:60vw; height:60vw;
      background: radial-gradient(circle, #f8a5c2 0%, transparent 70%);
      opacity:0.15; animation: blobFloat 18s 3s infinite alternate-reverse;
      border-radius:50%; pointer-events:none; z-index:0;
    }
    @keyframes blobFloat {
      0%{transform:translate(0,0) scale(1);}
      100%{transform:translate(3%,-4%) scale(1.06);}
    }
    .app-container {
      position:relative; z-index:1; max-width:920px; margin:0 auto; padding:18px 22px 42px;
    }
    header {
      display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
      padding:14px 22px; background:var(--glass-bg); backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px); border:1px solid var(--glass-border);
      border-radius:28px; margin-bottom:20px; box-shadow:var(--card-shadow);
    }
    .logo { display:flex; align-items:center; gap:8px; font-weight:800; font-size:1.5rem; }
    .logo .icon { font-size:2rem; animation: bounceIcon 2s infinite; }
    @keyframes bounceIcon { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
    .streak-badge {
      display:flex; align-items:center; gap:6px;
      background:linear-gradient(135deg, #f8a5c2, #e84393);
      color:#fff; padding:8px 18px; border-radius:40px; font-weight:700;
      box-shadow:0 0 18px var(--primary-glow); cursor:pointer; transition:0.3s;
    }
    .streak-badge:hover { transform:scale(1.04); }
    .header-actions { display:flex; gap:8px; }
    .btn-icon {
      width:44px; height:44px; border-radius:50%; border:2px solid var(--border);
      background:var(--surface); cursor:pointer; font-size:1.2rem;
      display:flex; align-items:center; justify-content:center;
      transition:0.3s; color:var(--text);
    }
    .btn-icon:hover { background:var(--primary); color:#fff; border-color:var(--primary); box-shadow:0 0 18px var(--primary-glow); }
    .tab-nav {
      display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px;
      background:var(--glass-bg); backdrop-filter:blur(20px);
      border-radius:22px; padding:6px; border:1px solid var(--glass-border);
    }
    .tab-btn {
      flex:1; min-width:85px; padding:12px 12px; border:none; border-radius:18px;
      cursor:pointer; font-weight:600; font-size:0.85rem; background:transparent;
      color:var(--text2); transition:0.3s; font-family:inherit; white-space:nowrap;
    }
    .tab-btn.active { background:var(--primary); color:#fff; box-shadow:0 6px 18px var(--primary-glow); }
    .tab-panel { display:none; animation: fadeIn 0.35s; }
    .tab-panel.active { display:block; }
    @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
    .card {
      background:var(--glass-bg); backdrop-filter:blur(24px);
      border:1px solid var(--glass-border); border-radius:28px;
      padding:22px; margin-bottom:18px; box-shadow:var(--card-shadow);
    }
    .topic-selector { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
    .topic-chip {
      padding:8px 16px; border-radius:40px; border:2px solid var(--border);
      background:var(--surface); cursor:pointer; font-weight:600; font-size:0.8rem;
      transition:0.3s; color:var(--text2); white-space:nowrap;
    }
    .topic-chip.active, .topic-chip:hover { background:var(--primary); color:#fff; border-color:var(--primary); }
    .flashcard-container { perspective:1200px; margin:14px 0; }
    .flashcard {
      width:100%; max-width:480px; margin:0 auto; height:240px;
      position:relative; cursor:pointer; transform-style:preserve-3d;
      transition:transform 0.6s;
    }
    .flashcard.flipped { transform:rotateY(180deg); }
    .flashcard-face {
      position:absolute; inset:0; border-radius:26px; display:flex;
      flex-direction:column; align-items:center; justify-content:center;
      backface-visibility:hidden; padding:20px; font-weight:700;
      border:2px solid var(--glass-border);
    }
    .flashcard-front {
      background:linear-gradient(135deg, #e84393, #f78fb3);
      color:#fff; font-size:2.8rem; letter-spacing:2px;
      font-family:'Noto Sans KR', sans-serif;
    }
    .flashcard-back { background:var(--surface); color:var(--text); transform:rotateY(180deg); }
    .flashcard-controls { display:flex; gap:10px; justify-content:center; margin-top:12px; }
    .flashcard-controls button {
      padding:10px 18px; border-radius:40px; border:2px solid var(--border);
      background:var(--surface); cursor:pointer; font-weight:600; transition:0.3s;
      color:var(--text);
    }
    .flashcard-controls button:hover { background:var(--primary); color:#fff; border-color:var(--primary); }
    .sentence-display {
      font-size:1.4rem; font-family:'Noto Sans KR', sans-serif;
      padding:16px; background:var(--surface2); border-radius:18px;
      margin:10px 0; text-align:center; border:1px dashed var(--border);
    }
    /* TOKEN MÀU SIÊU NỔI BẬT ĐÃ FIX */
    .token {
      padding: 3px 8px;
      border-radius: 8px;
      display: inline-block;
      font-weight: 700;
      margin: 0 3px;
      transition: 0.2s;
      border: 2px solid transparent;
    }
    .token-subject {
      background: #00cec9;
      color: #ffffff;
      border-color: #009c98;
    }
    .token-verb {
      background: #f78fb3;
      color: #ffffff;
      border-color: #e84393;
    }
    .token-object {
      background: #fdcb6e;
      color: #4a2c00;
      border-color: #e1a800;
    }
    .token-adjective {
      background: #ffdd59;
      color: #4a3b00;
      border-color: #d4b000;
    }
    .token-adverb {
      background: #55efc4;
      color: #004d2e;
      border-color: #2ecc71;
    }
    .token-noun {
      background: #dda0dd;
      color: #4a144a;
      border-color: #b47bb4;
    }
    .token-particle {
      background: #b2bec3;
      color: #2d3436;
      border-color: #636e72;
    }
    .dark-mode .token-subject {
      background: #00cec9;
      color: #fff;
      border-color: #00e5e5;
    }
    .dark-mode .token-verb {
      background: #f78fb3;
      color: #fff;
      border-color: #ff9cc5;
    }
    .dark-mode .token-object {
      background: #fdcb6e;
      color: #3a2600;
      border-color: #f9b800;
    }
    .dark-mode .token-adjective {
      background: #ffdd59;
      color: #3a2e00;
      border-color: #f0c800;
    }
    .dark-mode .token-adverb {
      background: #55efc4;
      color: #003d24;
      border-color: #3de0a8;
    }
    .dark-mode .token-noun {
      background: #dda0dd;
      color: #3d0f3d;
      border-color: #c591c5;
    }
    .dark-mode .token-particle {
      background: #848d93;
      color: #ffffff;
      border-color: #636e72;
    }
    .chat-area { max-height:460px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
    .chat-bubble {
      max-width:85%; padding:14px 18px; border-radius:20px; font-weight:500;
      animation: popIn 0.25s; font-size:0.9rem;
    }
    @keyframes popIn { from{opacity:0; transform:scale(0.9);} to{opacity:1; transform:scale(1);} }
    .chat-user { align-self:flex-end; background:var(--primary); color:#fff; }
    .chat-bot { align-self:flex-start; background:var(--surface2); border:1px solid var(--border); }
    .chat-input-row { display:flex; gap:8px; margin-top:12px; }
    .chat-input-row input {
      flex:1; padding:14px 18px; border-radius:40px; border:2px solid var(--border);
      background:var(--surface); font-family:inherit; font-size:1rem; outline:none;
    }
    .chat-input-row button {
      padding:14px 22px; border-radius:40px; background:var(--primary);
      color:#fff; font-weight:700; border:none; cursor:pointer; transition:0.3s;
    }
    .quiz-option {
      display:block; width:100%; padding:14px; margin:6px 0; border-radius:16px;
      border:2px solid var(--border); background:var(--surface); cursor:pointer;
      font-weight:600; text-align:left; transition:0.25s; color:var(--text);
    }
    .quiz-option.correct { background:#d4edc9 !important; border-color:#2ecc71 !important; }
    .quiz-option.wrong { background:#f8d7da !important; border-color:#e74c3c !important; }
    #confetti-canvas { position:fixed; top:0; left:0; width:100vw; height:100vh; pointer-events:none; z-index:999; }
    @media (max-width:600px) {
      .flashcard { height:180px; }
      .flashcard-front { font-size:2rem; }
    }
  </style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div class="app-container">
  <header>
    <div class="logo"><span class="icon">🌸</span> K‑Strawberry</div>
    <div class="streak-badge" id="streakBadge">🍓 <span id="streakCount">0</span> ngày</div>
    <div class="header-actions">
      <button class="btn-icon" id="darkToggle">🌙</button>
      <button class="btn-icon" id="soundToggle">🔊</button>
    </div>
  </header>
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="vocab">📚 Từ vựng</button>
    <button class="tab-btn" data-tab="grammar">🎀 Ngữ pháp</button>
    <button class="tab-btn" data-tab="bot">🤖 Bot sửa câu</button>
    <button class="tab-btn" data-tab="game">🍬 Mini Game</button>
  </nav>
  <div class="tab-panel active" id="tab-vocab">
    <div class="card">
      <h3>📚 Flashcard từ vựng</h3>
      <div class="topic-selector" id="topicSelector"></div>
      <div class="flashcard-container">
        <div class="flashcard" id="flashcard">
          <div class="flashcard-face flashcard-front" id="fcFront">한국어</div>
          <div class="flashcard-face flashcard-back" id="fcBack">
            <span class="romaja"></span>
            <span class="meaning"></span>
          </div>
        </div>
      </div>
      <div class="flashcard-controls">
        <button id="btnPrev">⬅️</button>
        <span id="cardProgress">1/8</span>
        <button id="btnNext">➡️</button>
        <button id="btnFlip">🔄 Lật</button>
      </div>
    </div>
  </div>
  <div class="tab-panel" id="tab-grammar">
    <div class="card">
      <h3>🎀 Ngữ pháp trực quan</h3>
      <div class="topic-selector" id="grammarSelector"></div>
      <div id="grammarExplanation" style="margin:8px 0; color:var(--text2)"></div>
      <div class="sentence-display" id="grammarSentence"></div>
      <div class="legend" id="grammarLegend" style="display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;"></div>
      <button id="btnMoreGrammar" style="margin-top:12px; padding:10px 18px; border-radius:40px; border:2px solid var(--border); background:var(--surface); cursor:pointer;">🔀 Xem ví dụ khác</button>
    </div>
  </div>
  <div class="tab-panel" id="tab-bot">
    <div class="card">
      <h3>🤖 Bot sửa ngữ pháp</h3>
      <div class="chat-area" id="chatArea">
        <div class="chat-bubble chat-bot">👋 안녕! Gõ câu tiếng Hàn, tớ check lỗi giúp cậu nha~</div>
      </div>
      <div class="chat-input-row">
        <input id="botInput" placeholder="Nhập câu tiếng Hàn..." onkeydown="if(event.key==='Enter')sendToBot()">
        <button onclick="sendToBot()">Gửi 🚀</button>
      </div>
    </div>
  </div>
  <div class="tab-panel" id="tab-game">
    <div class="card">
      <h3>🍬 Mini Game – Đoán nghĩa</h3>
      <div style="font-size:2.5rem; text-align:center; padding:20px;" id="quizWord">사랑</div>
      <div id="quizOptions"></div>
      <p id="quizFeedback" style="text-align:center; font-weight:600;"></p>
      <div style="text-align:center; margin-top:10px;">
        🏆 <span id="quizScore">0</span> điểm
        <button id="btnNextQuiz" style="margin-left:10px; padding:8px 16px; border-radius:40px; border:2px solid var(--border); background:var(--surface); cursor:pointer;">Câu tiếp</button>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    const state = {
      darkMode: localStorage.getItem('darkMode') === 'true',
      soundOn: localStorage.getItem('soundOn') !== 'false',
      streak: parseInt(localStorage.getItem('streak') || '0'),
      lastStudyDate: localStorage.getItem('lastStudyDate') || '',
      currentTopic: 'selfIntro',
      currentCardIndex: 0,
      currentGrammarIndex: 0,
      quizScore: 0,
      quizAnswered: false
    };

    // 35 topics vocabulary
    const vocabularyTopics = {
      selfIntro: { name:'🙋 자기소개', words:[

        {kr:'사진',rom:'sajin',vi:'Nhiếp ảnh'}

        {kr:'입',rom:'ip',vi:'Miệng'},{kr:'키',rom:'ki',vi:'Chiều cao'},{kr:'몸무게',rom:'momuge',vi:'Cân nặng'},

      ]},
      hobby: { name:'🎨 취미', words:[
        {kr:'독서',rom:'dokseo',vi:'Đọc sách'},{kr:'그림',rom:'geurim',vi:'Vẽ'},{kr:'요리',rom:'yori',vi:'Nấu ăn'},
        {kr:'등산',rom:'deungsan',vi:'Leo núi'},{kr:'자전거',rom:'jajeongeo',vi:'Xe đạp'},{kr:'수영',rom:'suyeong',vi:'Bơi lội'},

      movieMusic: { name:'🎬 영화&음악', words:[

        {kr:'떡볶이',rom:'tteokbokki',vi:'Bánh gạo cay'},{kr:'삼겹살',rom:'samgyeopsal',vi:'Thịt ba chỉ'},{kr:'커피',rom:'keopi',vi:'Cà phê'},

        {kr:'치통',rom:'chitong',vi:'Đau răng'},{kr:'병원',rom:'byeongwon',vi:'Bệnh viện'},{kr:'약',rom:'yak',vi:'Thuốc'},
        {kr:'의사',rom:'uisa',vi:'Bác sĩ'},{kr:'운동',rom:'undong',vi:'Tập thể dục'},{kr:'수면',rom:'sumyeon',vi:'Giấc ngủ'},
        {kr:'건강식',rom:'geongangsik',vi:'Thực phẩm lành mạnh'}
      ]},

    // ========== HELPERS ==========
    function saveState(){ localStorage.setItem('darkMode',state.darkMode); localStorage.setItem('soundOn',state.soundOn); localStorage.setItem('streak',state.streak); localStorage.setItem('lastStudyDate',state.lastStudyDate); }
    function applyTheme(){
      document.body.classList.toggle('dark-mode', state.darkMode);
      document.getElementById('darkToggle').textContent = state.darkMode ? '☀️' : '🌙';
    }
    function playBeep(f=800,d=80){
      if(!state.soundOn) return;
      try{
        const ctx=new(window.AudioContext||window.webkitAudioContext)();
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.frequency.value=f; g.gain.setValueAtTime(0.08,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d/1000);
        o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+d/1000);
      }catch(e){}
    }
    function updateStreak(){
      const today=new Date().toDateString();
      if(state.lastStudyDate!==today){
        const y=new Date(Date.now()-86400000).toDateString();
        state.streak = state.lastStudyDate===y ? state.streak+1 : 1;
        state.lastStudyDate=today; saveState();
        if(state.streak%7===0) spawnConfetti();
      }
      document.getElementById('streakCount').textContent=state.streak;
    }
    function spawnConfetti(){
      const c=document.getElementById('confetti-canvas'),ctx=c.getContext('2d');
      c.width=innerWidth; c.height=innerHeight;
      const p=[],colors=['#e84393','#f78fb3','#f6e58d','#ffdd59','#55efc4','#fdcb6e'];
      for(let i=0;i<100;i++) p.push({x:Math.random()*c.width, y:Math.random()*c.height-c.height, w:6+Math.random()*8, h:4+Math.random()*5, color:colors[Math.floor(Math.random()*colors.length)], vx:(Math.random()-0.5)*5, vy:Math.random()*3+2, rot:Math.random()*360, rv:(Math.random()-0.5)*6, op:1});
      let f=0;
      function draw(){
        ctx.clearRect(0,0,c.width,c.height);
        p.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.globalAlpha=p.op;ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;p.vy+=0.05;p.op-=0.004;});
        f++; if(f<140 && p.some(p=>p.op>0)) requestAnimationFrame(draw); else ctx.clearRect(0,0,c.width,c.height);
      } draw();
    }

    // VOCAB
    function renderTopics(){
      const c=document.getElementById('topicSelector'); c.innerHTML='';
      Object.entries(vocabularyTopics).forEach(([k,t])=>{
        const chip=document.createElement('span');
        chip.className='topic-chip'+(state.currentTopic===k?' active':'');
        chip.textContent=t.name; chip.onclick=()=>{ state.currentTopic=k; state.currentCardIndex=0; renderTopics(); renderFlashcard(); playBeep(600,50); };
        c.appendChild(chip);
      });
    }
    function renderFlashcard(){
      const t=vocabularyTopics[state.currentTopic], w=t.words[state.currentCardIndex];
      document.getElementById('fcFront').textContent=w.kr;
      document.getElementById('fcBack').querySelector('.romaja').textContent=w.rom;
      document.getElementById('fcBack').querySelector('.meaning').textContent=w.vi;
      document.getElementById('cardProgress').textContent=`${state.currentCardIndex+1}/${t.words.length}`;
      document.getElementById('flashcard').classList.remove('flipped');
    }
    function flipCard(){ document.getElementById('flashcard').classList.toggle('flipped'); playBeep(800,40); updateStreak(); }
    function nextCard(){ const t=vocabularyTopics[state.currentTopic]; state.currentCardIndex=(state.currentCardIndex+1)%t.words.length; renderFlashcard(); playBeep(500,40); }
    function prevCard(){ const t=vocabularyTopics[state.currentTopic]; state.currentCardIndex=(state.currentCardIndex-1+t.words.length)%t.words.length; renderFlashcard(); }

    // GRAMMAR
    function renderGrammarSelector(){
      const c=document.getElementById('grammarSelector'); c.innerHTML='';
      grammarStructures.forEach((gs,i)=>{
        const chip=document.createElement('span');
        chip.className='topic-chip'+(state.currentGrammarIndex===i?' active':'');
        chip.textContent=gs.title.substring(0,16)+'…'; chip.title=gs.title;
        chip.onclick=()=>{ state.currentGrammarIndex=i; renderGrammarSelector(); renderGrammarExample(); playBeep(600,40); };
        c.appendChild(chip);
      });
    }
    function renderGrammarExample(){
      const gs=grammarStructures[state.currentGrammarIndex];
      const ex=gs.examples[Math.floor(Math.random()*gs.examples.length)];
      document.getElementById('grammarExplanation').textContent='📝 '+gs.title+' — '+gs.explain;
      const div=document.getElementById('grammarSentence');
      div.innerHTML=ex.tokens.map(t=>`<span class="token token-${t.type}">${t.t}</span>`).join(' ')+`<div style="font-size:0.65rem;margin-top:6px;">${ex.full}</div>`;
      document.getElementById('grammarLegend').innerHTML=['subject','verb','object','adjective','adverb','noun','particle'].map(t=>`<span><span class="legend-dot" style="background:var(--${t})"></span> ${t}</span>`).join(' ');
    }

    // BOT
    function analyzeSentence(input){
      const tokens=[]; const raw=input.trim().split(/\s+/);
      raw.forEach(tok=>{
        let type='noun'; if(/은$|는$|이$|가$/.test(tok)) type='subject'; else if(/을$|를$/.test(tok)) type='object';
        else if(/다$|요$|ㅂ니다$|습니다$|세요$/.test(tok)) type='verb'; else if(/게$|에서$|에$|으로$/.test(tok)) type='adverb';
        tokens.push({t:tok,type});
      });
      return {tokens, original:input.trim()};
    }
    function sendToBot(){
      const input=document.getElementById('botInput'); const text=input.value.trim(); if(!text) return;
      updateStreak(); const chat=document.getElementById('chatArea');
      const uB=document.createElement('div'); uB.className='chat-bubble chat-user'; uB.textContent=text; chat.appendChild(uB);
      const tB=document.createElement('div'); tB.className='chat-bubble chat-bot'; tB.innerHTML='<div class="typing-indicator"><span></span><span></span><span></span></div>'; chat.appendChild(tB);
      input.value=''; chat.scrollTop=chat.scrollHeight;
      setTimeout(()=>{
        tB.remove(); const analysis=analyzeSentence(text);
        const high=analysis.tokens.map(t=>`<span class="token token-${t.type}">${t.t}</span>`).join(' ');
        const resp=document.createElement('div'); resp.className='chat-bubble chat-bot';
        resp.innerHTML=`📌 ${high}<br>🔍 Bot đã phân tích! Hãy kiểm tra màu sắc nhé.`;
        chat.appendChild(resp); chat.scrollTop=chat.scrollHeight;
      },700);
    }

    // MINI GAME
    function generateQuiz(){
      state.quizAnswered=false; const all=Object.values(vocabularyTopics).flatMap(t=>t.words);
      const correct=all[Math.floor(Math.random()*all.length)];
      document.getElementById('quizWord').textContent=correct.kr;
      document.getElementById('quizFeedback').textContent='';
      const opts=[correct]; while(opts.length<4){ const r=all[Math.floor(Math.random()*all.length)]; if(!opts.find(o=>o.vi===r.vi)) opts.push(r); }
      opts.sort(()=>Math.random()-0.5);
      const container=document.getElementById('quizOptions'); container.innerHTML='';
      opts.forEach(o=>{
        const btn=document.createElement('button'); btn.className='quiz-option'; btn.textContent=o.vi;
        btn.onclick=()=>{
          if(state.quizAnswered) return; state.quizAnswered=true;
          if(o.vi===correct.vi){ btn.classList.add('correct'); state.quizScore+=10; document.getElementById('quizFeedback').textContent='✅ Đúng!'; playBeep(1000,80); spawnConfetti(); }
          else { btn.classList.add('wrong'); document.getElementById('quizFeedback').textContent=`❌ Sai! Đáp án: ${correct.vi}`; }
          document.getElementById('quizScore').textContent=state.quizScore; updateStreak();
        };
        container.appendChild(btn);
      });
    }

    // INIT
    function init(){
      applyTheme(); updateStreak();
      document.getElementById('soundToggle').textContent=state.soundOn?'🔊':'🔇';
      renderTopics(); renderFlashcard(); renderGrammarSelector(); renderGrammarExample(); generateQuiz();
      document.getElementById('darkToggle').onclick=()=>{ state.darkMode=!state.darkMode; applyTheme(); saveState(); };
      document.getElementById('soundToggle').onclick=function(){ state.soundOn=!state.soundOn; this.textContent=state.soundOn?'🔊':'🔇'; saveState(); };
      document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>{
        document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));
        b.classList.add('active'); document.getElementById('tab-'+b.dataset.tab).classList.add('active');
        updateStreak();
      });
      document.getElementById('flashcard').onclick=flipCard;
      document.getElementById('btnFlip').onclick=(e)=>{e.stopPropagation(); flipCard();};
      document.getElementById('btnNext').onclick=(e)=>{e.stopPropagation(); nextCard();};
      document.getElementById('btnPrev').onclick=(e)=>{e.stopPropagation(); prevCard();};
      document.getElementById('btnMoreGrammar').onclick=renderGrammarExample;
      document.getElementById('btnNextQuiz').onclick=generateQuiz;
      document.getElementById('streakBadge').onclick=()=>alert(`🔥 Chuỗi ${state.streak} ngày!`);
    }
    document.addEventListener('DOMContentLoaded', init);
  })();
</script>
</body>
</html>
